<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico das Ligas - Portal Futmath</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <header class="cabecalho">
        <div class="container-cabecalho">
            <div class="logo-secao">
                <a href="../index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                    <img src="../Imagens/logo.jpg" alt="Logo" class="logo">
                    <h1 class="titulo-principal">Portal Futmath</h1>
                </a>
            </div>
            <nav class="navegacao-principal">
                <ul class="menu-navegacao">
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="historico.html">Histórico</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="conteudo-principal">
        <section class="secao-historico">
            <div class="container">
                <h2 class="titulo-pagina">Maiores Campeões das Ligas</h2>

                <div class="secao-filtro">
                    <div class="botoes-filtro">
                        <button class="botao-filtro ativo" id="btn-hist-br">Série A (Brasil)</button>
                        <button class="botao-filtro" id="btn-hist-en">Premier League (Inglaterra)</button>
                    </div>
                </div>

                <div class="tabela-responsiva margem-superior">
                    <table class="tabela-jogadores">
                        <thead>
                            <tr>
                                <th>Clube</th>
                                <th>Títulos</th>
                                <th>Anos das Conquistas</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela-historico">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="rodape">
        <div class="rodape-inferior">
            <p class="texto-copyright">&copy; 2026 Portal Futmath. Desenvolvido por Marcelo.</p>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="script-paginas.js"></script>

</html>
